<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
        }

        table{
            margin: auto;
            border-collapse: collapse;
            width: 600px;
        }

        
       th, td{
            border: 2px solid white;
            padding: 12px;
        }
        
        th {
            background: #e6e6e6;
        }

        td{
            background: #1f2c34;
            color: white;
        }
    </style>
</head>
<body>
    <h2>Table of Indian States and its Capitals</h2>
    <table>
        <tr>
            <th>Sl no.</th>
            <th>State</th>
            <th>Capital</th>
            <th>Visited the State?</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Rajasthan</td>
            <td>Jaipur</td>
            <td>Yes</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Maharashtra</td>
            <td>Mumbai</td>
            <td>No</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Tamil Nadu</td>
            <td>Chennai</td>
            <td>Yes</td>
        </tr>

        <tr>
            <td>4</td>
            <td>Gujarat</td>
            <td>Gandhinagar</td>
            <td>No</td>
        </tr>
    </table>
</body>
</html>
