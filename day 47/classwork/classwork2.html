<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Register</title>
    <style>
        body {
            background: #2f2f2f;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .div1 {
            width: 300px;
            background: rgb(240, 240, 240);
            border-radius: 6px;
            
        }

        .h1 {
            background: #4b5a66;
            color: white;
            font-size: 40px;
        }

        .input {
            width: 260px;
            height: 35px;
            border: none;
            background: #ffffff;
            border-radius: 3px;
        }

        .register {
            width: 260px;
            height: 40px;
            background: #6c8fa1;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 16px;
        }
       
    </style>
</head>

<body>
    <form>
        <br><br>
        <div class="div1">
            <br>
            <div class="h1">Wanna be Cool?!</div>
            <br>
            <input class="input" type="text" placeholder="First Name"><br><br>
            <input class="input" type="email" placeholder="E-mail"><br><br>
            <input class="input" type="email" placeholder="Confirm your E-mail"><br><br>
            <button class="register">REGISTER</button>
            <br><br>
        </div>
    </form>
</body>

</html>
