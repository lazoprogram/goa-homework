<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>

    <style>
        body {
            background: whitesmoke;
            font-family: Arial, sans-serif;
        }

        h2 {
            color: #2aa9c5;
        }

        label {
            color: #2aa9c5;
            width: 200px;
            font-size: 14px;
            
        }

        #inp{
            height: 200px;
            width: 400px;
        }

        button {
            border: none;
            border-radius: 12px;
            background: white;
            color: darkcyan;
        }
        #inp2{
            font-size: 33px;
            height: 20px;
        }
        #inp3{
            font-size: 33px;
            height: 20px;
        }
        #inp4{
            font-size: 33px;
            height: 20px;
        }
        form{
            border: 1px solid darkcyan;
            border-radius: 10px;
        }
    </style>

</head>

<body>
    <form>
        <h2>Contact Form :</h2>
    
        <label>Your name</label><br>
        <input type="text" id="inp4"><br><br>

        <label>Email Address</label><br>
        <input type="email" id="inp3"><br><br>

        <label>Subject</label><br>
        <input type="text" id="inp2"><br><br>

        <label>Message</label><br>
        <input type="text" id="inp">
        <br><br>

        <button>Submit Form</button>
    </form>
</body>

</html>
